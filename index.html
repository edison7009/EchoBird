<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/ico.png" />
  <!-- Preload the sidebar wordmark logo. Without this the browser only starts
       fetching it after React mounts and Sidebar renders the <img>, so it
       pops in visibly later than the rest of the first paint. -->
  <link rel="preload" as="image" href="/brand/bird.png" fetchpriority="high" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Echobird</title>
  <!-- Resolve the theme synchronously *before* any CSS or JS runs, so the
       html/body background matches the user's saved choice during the brief
       window between WebView paint and React mount. themeStore writes
       localStorage['theme'] on every apply() — see src/stores/themeStore.ts. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) { /* private mode etc. — fall through to CSS defaults */ }
    })();
  </script>
  <style>
    /* Lora Bold Italic — Google Font, latin subset (~22 KB woff2).
       Used by the sidebar brand-mark. Inline @font-face here so it's
       available before src/index.css loads. */
    @font-face {
      font-family: 'Lora';
      src: url('/fonts/Lora-BoldItalic.woff2') format('woff2');
      font-weight: 700;
      font-style: italic;
      font-display: block;
    }
    /* html/body MUST stay transparent — see src/index.css.
       The actual app palette is painted by the .rounded-xl shell in
       App.tsx. A solid color here filled the four corners of the OS
       window (which is square because we force DWMWCP_DONOTROUND)
       with the theme bg, defeating the rounded clip-path. In dark
       theme the spill colour matched the desktop and was invisible;
       in light theme on a coloured desktop it showed up as a square
       halo. The window stays hidden (visible:false) until appReady()
       so there is no flash to mask. */
    html, body {
      background: transparent;
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
