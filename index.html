<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/ico.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Echobird</title>
  <!-- Resolve the theme synchronously *before* any CSS or JS runs, so the
       html/body background matches the user's saved choice during the brief
       window between WebView paint and React mount. themeStore writes
       localStorage['theme'] on every apply() — see src/stores/themeStore.ts. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = t;
      } catch (e) { /* private mode etc. — fall through to CSS defaults */ }
    })();
  </script>
  <style>
    /* Lora Bold Italic — Google Font, latin subset (~22 KB woff2).
       Used by the sidebar brand-mark. Inline @font-face here so it's
       available before src/index.css loads. */
    @font-face {
      font-family: 'Lora';
      src: url('/fonts/Lora-BoldItalic.woff2') format('woff2');
      font-weight: 700;
      font-style: italic;
      font-display: block;
    }
    /* Match the real app palette (src/index.css):
       dark  → #211F1C, light → #EFEEEB. The window stays hidden via Tauri
       (visible:false in tauri.conf.json) until React mounts and calls
       appReady(), so this background is mainly visible during the first
       paint of the main UI. */
    html, body {
      background: #211F1C;
      margin: 0;
      padding: 0;
    }
    :root[data-theme="light"] body,
    :root[data-theme="light"] { background: #EFEEEB; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
