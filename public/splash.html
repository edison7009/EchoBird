<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Echobird</title>
    <style>
        @font-face {
            font-family: 'Orbitron';
            src: url('fonts/Orbitron-Bold.ttf') format('truetype');
            font-weight: 700;
            font-display: block;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            user-select: none;
        }

        .splash-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
        }

        .logo {
            width: 72px;
            height: 72px;
        }

        .title {
            color: #D97757;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 3px;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }

        .loader {
            display: flex;
            gap: 10px;
        }

        .loader span {
            width: 4px;
            height: 4px;
            border-radius: 1px;
            background: #D97757;
            opacity: 0.15;
            animation: dot 2.4s ease infinite;
        }

        .loader span:nth-child(2) {
            animation-delay: 0.5s;
        }

        .loader span:nth-child(3) {
            animation-delay: 1.0s;
        }


        @keyframes dot {

            0%,
            100% {
                opacity: 0.15;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="splash-card">
        <img class="logo" src="ico.png" alt="">
        <div class="title" id="appTitle">EchoBird</div>
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
    <script>
        // App name is "EchoBird" in every locale — no Chinese alias.
    </script>
</body>

</html>
