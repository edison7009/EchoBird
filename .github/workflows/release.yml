name: Release

on:
  push:
    tags:
      - 'v*'

# Opt into Node.js 24 runner for all JavaScript-based actions before the
# 2026-06-02 forced switch (mirrors the same opt-in in ci.yml).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            rust-target: 'x86_64-pc-windows-msvc'
            args: ''

          # macOS: native build per architecture. Rosetta 2 only runs the
          # OTHER way (Intel binaries on ARM Macs) — Intel Macs cannot run
          # ARM-only apps, so we ship both. macos-latest is ARM, macos-13
          # is the last Intel runner GitHub offers. Intel runners can have
          # noticeable queue delays vs ARM; we accept that for full Mac
          # coverage. When GitHub retires macos-13 we'll switch to a
          # cross-build on macos-latest with `--target x86_64-apple-darwin`.
          - platform: 'macos-latest'
            rust-target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin --bundles dmg'

          - platform: 'macos-13'
            rust-target: 'x86_64-apple-darwin'
            args: '--target x86_64-apple-darwin --bundles dmg'

          # Linux: deb + rpm only. AppImage bundles full webkit/gtk runtime
          # (~80MB each); deb/rpm rely on system webkit2gtk (~11MB each).
          - platform: 'ubuntu-latest'
            rust-target: 'x86_64-unknown-linux-gnu'
            args: '--bundles deb,rpm'

          - platform: 'ubuntu-24.04-arm'
            rust-target: 'aarch64-unknown-linux-gnu'
            args: '--bundles deb,rpm'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EchoBird ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  rename-assets:
    # Tauri's bundler uses inconsistent filenames (no platform label, RPM "-1"
    # release counter, version-less updater bundle). Rename every asset on the
    # release in place via the GitHub API — non-destructive, no re-upload.
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename release assets with platform labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          # Pull every asset on this tag, derive a clean platform-labeled name,
          # PATCH only when the name actually changes.
          gh api "repos/${REPO}/releases/tags/${TAG}" \
            --jq '.assets[] | "\(.id)\t\(.name)"' \
          | while IFS=$'\t' read -r ID NAME; do
              case "$NAME" in
                *_x64-setup.exe)             NEW="EchoBird_${VER}_Windows_x64-setup.exe" ;;
                *_x64_*.msi)                 NEW="EchoBird_${VER}_Windows_x64.msi" ;;
                *_aarch64.dmg)               NEW="EchoBird_${VER}_macOS_arm64.dmg" ;;
                *_x64.dmg)                   NEW="EchoBird_${VER}_macOS_x64.dmg" ;;
                *_amd64.deb)                 NEW="EchoBird_${VER}_Linux_x64.deb" ;;
                *_arm64.deb)                 NEW="EchoBird_${VER}_Linux_arm64.deb" ;;
                *.x86_64.rpm)                NEW="EchoBird_${VER}_Linux_x64.rpm" ;;
                *.aarch64.rpm)               NEW="EchoBird_${VER}_Linux_arm64.rpm" ;;
                *)                           NEW="" ;;
              esac
              if [ -n "$NEW" ] && [ "$NEW" != "$NAME" ]; then
                echo "rename: $NAME  ->  $NEW"
                gh api -X PATCH "repos/${REPO}/releases/assets/${ID}" -f name="$NEW" --jq '.name'
              fi
            done

  sync-version-manifest:
    # Updates docs/api/version/index.json (served at echobird.ai/api/version/index.json)
    # so the in-app "Check for updates" prompt sees the new version. Must stay in sync
    # with src-tauri/tauri.conf.json — see memory/reference_version_update.md.
    needs: rename-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write version manifest
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          MANIFEST="docs/api/version/index.json"
          # Policy: tag annotations are English (engineering audience),
          # `releaseNotes` is Chinese (user-facing). Previously this job
          # read the tag subject and overwrote releaseNotes — which leaked
          # the English annotation into the in-app update prompt. We now
          # preserve whatever releaseNotes the release commit already
          # wrote into the manifest, and only refresh version + date.
          # Falls back to a generic note when the manifest is malformed
          # or missing the field.
          EXISTING_NOTES="$(jq -r '.releaseNotes // empty' "$MANIFEST" 2>/dev/null || true)"
          if [ -z "$EXISTING_NOTES" ]; then
            EXISTING_NOTES="Release $TAG_NAME"
          fi
          jq -n \
            --arg v "$VERSION" \
            --arg d "$DATE" \
            --arg n "$EXISTING_NOTES" \
            '{version: $v, releaseDate: $d, releaseNotes: $n}' \
            > "$MANIFEST"

      - name: Commit and push
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/version/index.json
          if git diff --staged --quiet; then
            echo "Manifest already up to date; nothing to commit."
            exit 0
          fi
          git commit -m "docs: publish ${TAG_NAME} release notes"
          git push origin main
