name: Trigger Release

on:
  push:
    tags:
      - 'v*'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger build in public repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.RELEASE_TOKEN }}" \
            https://api.github.com/repos/edison7009/Echobird-MotherAgent/dispatches \
            -d '{"event_type":"trigger-release","client_payload":{"tag":"${{ github.ref_name }}","ref":"${{ github.ref }}"}}'
