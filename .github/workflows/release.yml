name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            rust-target: 'x86_64-pc-windows-msvc'
            args: ''

          - platform: 'macos-latest'
            rust-target: 'aarch64-apple-darwin x86_64-apple-darwin'
            args: '--target universal-apple-darwin'

          - platform: 'ubuntu-latest'
            rust-target: 'x86_64-unknown-linux-gnu'
            args: ''

          - platform: 'ubuntu-24.04-arm'
            rust-target: 'aarch64-unknown-linux-gnu'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EchoBird ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  sync-version-manifest:
    # Updates docs/api/version/index.json (served at echobird.ai/api/version/index.json)
    # so the in-app "Check for updates" prompt sees the new version. Must stay in sync
    # with src-tauri/tauri.conf.json — see memory/reference_version_update.md.
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write version manifest
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          DATE="$(date -u +%Y-%m-%d)"
          # Prefer the annotated tag's subject line; fall back to a generic note for lightweight tags.
          NOTES="$(git tag -l --format='%(contents:subject)' "$TAG_NAME")"
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG_NAME"
          fi
          jq -n \
            --arg v "$VERSION" \
            --arg d "$DATE" \
            --arg n "$NOTES" \
            '{version: $v, releaseDate: $d, releaseNotes: $n}' \
            > docs/api/version/index.json

      - name: Commit and push
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/version/index.json
          if git diff --staged --quiet; then
            echo "Manifest already up to date; nothing to commit."
            exit 0
          fi
          git commit -m "docs: publish ${TAG_NAME} release notes"
          git push origin main
