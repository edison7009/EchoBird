name: Refresh Pulse Data

# Mirrors SuYxh/ai-news-aggregator's latest-{24h,7d}.json into docs/pulse/
# so echobird.ai/pulse/* serves them as static files (the Cloudflare Pages
# fallback for when the pulse-worker isn't deployed). Commits only when the
# upstream payload changed, to keep git history bounded.

on:
  schedule:
    - cron: '15 */6 * * *'   # every 6 hours, offset 15min from the hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-pulse-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream pulse files
        run: |
          set -euo pipefail
          mkdir -p docs/pulse
          base="https://raw.githubusercontent.com/SuYxh/ai-news-aggregator/main/data"
          for f in latest-24h.json latest-7d.json; do
            tmp="$(mktemp)"
            curl -fsSL --retry 3 --retry-delay 5 -o "$tmp" "$base/$f"
            # Sanity: must be JSON, not an HTML error page
            head -c 1 "$tmp" | grep -q '{' || { echo "::error::$f did not look like JSON"; exit 1; }
            mv "$tmp" "docs/pulse/$f"
          done
          ls -lh docs/pulse/

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pulse/latest-24h.json docs/pulse/latest-7d.json
          if git diff --cached --quiet; then
            echo "No upstream changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(pulse): refresh upstream snapshot"
          git push

      # Mirror to Tencent COS (Hong Kong) so mainland-China users have a
      # GFW-friendly source. Runs every cycle (idempotent overwrite, ~10MB)
      # so a one-off upload failure self-heals on the next run.
      - name: Mirror to Tencent COS
        env:
          TENCENT_COS_SECRET_ID:  ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          TENCENT_COS_BUCKET:     ${{ secrets.TENCENT_COS_BUCKET }}
          TENCENT_COS_REGION:     ${{ secrets.TENCENT_COS_REGION }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet coscmd
          coscmd config \
            -a "$TENCENT_COS_SECRET_ID" \
            -s "$TENCENT_COS_SECRET_KEY" \
            -b "$TENCENT_COS_BUCKET" \
            -r "$TENCENT_COS_REGION"
          coscmd upload docs/pulse/latest-24h.json /latest-24h.json
          coscmd upload docs/pulse/latest-7d.json  /latest-7d.json
