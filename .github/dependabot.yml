# Dependabot configuration for EchoBird
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Routine version-update PRs for cargo and npm were retired 2026-05-14:
# they produced ~10 PRs per week with marginal value for an active
# project, and the actual security signal is already covered by
# (a) `cargo audit` + `npm audit` running in CI on every push/PR, and
# (b) GitHub Dependabot SECURITY ALERTS (a separate feature that runs
# even without this file). Only github-actions version pinning is kept
# here — it's low-noise and keeps the workflow files current.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    reviewers:
      - "edison7009"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
